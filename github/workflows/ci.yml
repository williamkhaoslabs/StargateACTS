name: CI

on:
  push:
    branches:
      - dev
      - "feature/*"
      - "bugfix/*"
  pull_request:
    branches:
      - main
      - dev

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [csharp, javascript-typescript]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          language: ${{ matrix.language }}

      - name: Setup .NET 10 (for C# analysis)
        if: matrix.language == 'csharp'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build .NET for CodeQL
        if: matrix.language == 'csharp'
        run: |
          dotnet restore
          dotnet build --no-restore --configuration Release

      - name: Setup Node 22 (for JS/TS analysis)
        if: matrix.language == 'javascript-typescript'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Angular dependencies (for JS/TS analysis)
        if: matrix.language == 'javascript-typescript'
        working-directory: stargate-ui
        run: npm ci

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        run: dotnet test StargateAPI.Tests/StargateAPI.Tests.csproj --no-build --configuration Release --collect:"XPlat Code Coverage"

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Angular dependencies
        working-directory: stargate-ui
        run: npm ci

      - name: Test Angular
        working-directory: stargate-ui
        run: npx ng test --watch=false
    
      - name: Build Angular
        working-directory: stargate-ui
        run: npm run build -- --configuration production