<a class="skip-link" href="#main-content">Skip to main content</a>

<header class="topbar" role="banner">
  <div class="topbar-left">
    <a class="brand" routerLink="/" (click)="closeMenu()" aria-label="ACTS Home">ACTS</a>
    <nav class="nav-links" [class.open]="mobileMenuOpen" aria-label="Main navigation">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMenu()">People</a>
      <a routerLink="/dashboard" routerLinkActive="active" (click)="closeMenu()">Dashboard</a>
      <a routerLink="/add-duty" routerLinkActive="active" (click)="closeMenu()">Duties</a>
      <a routerLink="/activity-log" routerLinkActive="active" (click)="closeMenu()">Activity Log</a>
    </nav>
  </div>
  <div class="topbar-right">
    <button
      class="hamburger"
      [class.open]="mobileMenuOpen"
      [attr.aria-expanded]="mobileMenuOpen"
      aria-controls="mobile-nav"
      aria-label="Toggle navigation menu"
    >
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<main class="main-content" id="main-content" role="main" [@routeAnimation]="prepareRoute(outlet)">
  <router-outlet #outlet="outlet" />
</main>

<app-toast />
